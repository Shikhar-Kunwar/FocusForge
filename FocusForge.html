<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusForge</title>
  <style>
    /* ... Your existing CSS here ... */
    
    body { 
      margin: 0; font-family: 'Segoe UI', sans-serif; 
      background-color: #f4f6f9; color: #111827; 
      transition: background 0.3s, color 0.3s;
    }

    /* DARK MODE STYLES */
    body.dark-theme {
      background-color: #0f172a; /* Deep Navy/Black */
      color: #f1f5f9;
    }

    body.dark-theme .card {
      background-color: #1e293b; /* Charcoal Gray cards */
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    body.dark-theme .card p, body.dark-theme .card h2 {
      color: white;
    }

    /* Login Button Style */
    .login-btn {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    /* ... rest of your dashboard/card CSS ... */
  </style>
</head>
<body id="main-body">

  <nav>
    <h1>FocusForge</h1>
    <ul style="align-items: center;">
      <li><a href="Timetable.html">Timetable</a></li>
      <li><button class="login-btn">Login / Sign Up</button></li>
      <li><button onclick="toggleDarkMode()" style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">🌓</button></li>
    </ul>
  </nav>

  <div class="dashboard"> 
    <a href="Timer.html" style="text-decoration: none; color: inherit;">
      <div class="card">
        <h2>Pomodoro Timer</h2>
        <p style="font-size: 2rem; color: #10b981;">25:00</p>
        <p>Click to Start</p>
      </div>
    </a>

    <div class="card" onclick="updateStreak()">
      <h2>Study Streak 🔥</h2>
      <p id="streak-count" style="font-size: 2rem;">0 Days</p>
      <p>Click to log today!</p>
    </div>

    <div class="card">
      <h2>LoFi Beats 🎧</h2>
      <p>🎵 Now Playing: Focus.mp3</p>
    </div>

    <div class="card">
      <h2>Upcoming Exams</h2>
      <ul>
        <li>Math - 20 Feb</li>
      </ul>
    </div>

    <div class="card">
      <h2>Study Hours</h2>
      <p>0 / 6 hours today</p>
    </div>
  </div>

  <script>
    function toggleDarkMode() {
      // This one line toggles the entire theme
      document.body.classList.toggle('dark-theme');
    }

    let count = 0;
    function updateStreak() {
      count++;
      document.getElementById('streak-count').innerText = count + " Days";
    }
  </script>
</body>
</html>
