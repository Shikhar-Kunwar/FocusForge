<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusForge</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; color: #111827; transition: 0.3s; }
    body.dark-theme { background-color: #0f172a; color: #f1f5f9; }

    nav { background-color: #111827; color: white; padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; }
    nav ul { list-style: none; display: flex; gap: 20px; align-items: center; margin: 0; }
    .login-btn { background-color: #3b82f6; color: white; border: none; padding: 6px 15px; border-radius: 5px; cursor: pointer; font-weight: 600; }

    /* UNIFORM GRID - 230px height for ALL cards */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      grid-auto-rows: 230px; 
      gap: 15px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background-color: white;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between; /* Spreads content top-to-bottom */
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border: 1px solid #e5e7eb;
      text-decoration: none;
      color: inherit;
    }

    body.dark-theme .card { background-color: #1e293b; border-color: #334155; }
    .card h2 { font-size: 1rem; margin: 0; color: #6b7280; }
    body.dark-theme .card h2 { color: #94a3b8; }

    /* PLAYER SPECIFIC STYLES */
    .player-display { display: flex; align-items: center; gap: 12px; width: 100%; margin-top: 10px; }
    #track-art { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
    #seek-slider { width: 100%; accent-color: #3b82f6; cursor: pointer; margin: 0; }
    .music-controls { display: flex; justify-content: center; gap: 25px; align-items: center; width: 100%; }
    .music-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: inherit; }
    .main-play { font-size: 1.8rem; }
  </style>
</head>
<body>

  <nav>
    <h1>FocusForge</h1>
    <ul>
      <li><a href="Timetable.html" style="color:white; text-decoration:none;">Timetable</a></li>
      <li><button class="login-btn">Login / Sign Up</button></li>
      <li><button onclick="toggleDarkMode()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">🌓</button></li>
    </ul>
  </nav>

  <div class="dashboard"> 
    <a href="Timer.html" class="card">
      <h2>Pomodoro Timer</h2>
      <div style="font-size: 2.5rem; font-weight: bold; color: #10b981;">25:00</div>
      <div style="font-size: 0.8rem; color: #9ca3af;">Click to start session</div>
    </a>

    <a href="streak.html" class="card">
      <h2>Study Streak 🔥</h2>
      <div id="dash-streak" style="font-size: 3rem; font-weight: bold;">0</div>
      <div style="font-size: 0.8rem; color: #9ca3af;">Check Progress</div>
    </a>

    <div class="card">
      <h2>LoFi Player 🎧</h2>
      <div class="player-display">
        <img id="track-art" src="https://via.placeholder.com/50" alt="Art">
        <div style="text-align: left; overflow: hidden;">
          <div id="track-name" style="font-weight: bold; font-size: 0.9rem; white-space: nowrap;">Lazy Song</div>
          <div id="track-next" style="font-size: 0.7rem; color: #94a3b8;">Next: --</div>
        </div>
      </div>
      <div style="width: 100%;">
        <input type="range" id="seek-slider" min="0" max="100" value="0" onchange="seekTo()">
        <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: #94a3b8;">
          <span id="current-time">00:00</span>
          <span id="total-duration">00:00</span>
        </div>
      </div>
      <div class="music-controls">
        <button onclick="prevTrack()" class="music-btn">⏮</button>
        <button onclick="playPauseTrack()" id="playpause-btn" class="music-btn main-play">▶</button>
        <button onclick="nextTrack()" class="music-btn">⏭</button>
      </div>
      <audio id="music-player" src="" onended="nextTrack()"></audio>
    </div>

    <div class="card">
      <h2>Upcoming Exams</h2>
      <div style="width: 100%; text-align: left; padding: 0 10px;">
        <p style="margin: 5px 0;">📚 Math - Feb 20</p>
        <p style="margin: 5px 0;">🧪 Science - Feb 22</p>
      </div>
      <div></div> </div>
  </div>

  <script>
    // THEME & STREAK SYNC
    function toggleDarkMode() {
      const isDark = document.body.classList.toggle('dark-theme');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    window.onload = function() {
      if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
      document.getElementById('dash-streak').innerText = localStorage.getItem('focusStreak') || 0;
      loadTrack(track_index);
    };

    // MUSIC LOGIC
    let track_index = 0;
    let isPlaying = false;
    let updateTimer;
    const curr_track = document.getElementById('music-player');
    const playpause_btn = document.getElementById('playpause-btn');
    const track_art = document.getElementById('track-art');
    const track_name = document.getElementById('track-name');
    const track_next = document.getElementById('track-next');
    const seek_slider = document.getElementById('seek-slider');
    const curr_time = document.getElementById('current-time');
    const total_dur = document.getElementById('total-duration');

    const track_list = [
      { name: "The Lazy Song", artist: "Bruno Mars", image: "lazy-art.jpg", path: "lazy-song.mp3" },
      { name: "Focus Flow", artist: "Lofi Girl", image: "https://via.placeholder.com/50", path: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" }
    ];

    function loadTrack(index) {
      clearInterval(updateTimer);
      curr_track.src = track_list[index].path;
      curr_track.load();
      track_art.src = track_list[index].image;
      track_name.innerText = track_list[index].name;
      let nextIndex = (index + 1) % track_list.length;
      track_next.innerText = "Next: " + track_list[nextIndex].name;
      updateTimer = setInterval(seekUpdate, 1000);
    }

    function playPauseTrack() { isPlaying ? pauseTrack() : playTrack(); }
    function playTrack() { curr_track.play(); isPlaying = true; playpause_btn.innerText = "⏸"; }
    function pauseTrack() { curr_track.pause(); isPlaying = false; playpause_btn.innerText = "▶"; }
    function nextTrack() { track_index = (track_index + 1) % track_list.length; loadTrack(track_index); playTrack(); }
    function prevTrack() { track_index = (track_index - 1 + track_list.length) % track_list.length; loadTrack(track_index); playTrack(); }
    function seekTo() { curr_track.currentTime = curr_track.duration * (seek_slider.value / 100); }
    
    function seekUpdate() {
      if (!isNaN(curr_track.duration)) {
        seek_slider.value = curr_track.currentTime * (100 / curr_track.duration);
        let curM = Math.floor(curr_track.currentTime / 60);
        let curS = Math.floor(curr_track.currentTime % 60);
        let durM = Math.floor(curr_track.duration / 60);
        let durS = Math.floor(curr_track.duration % 60);
        curr_time.innerText = `${curM}:${curS < 10 ? '0'+curS : curS}`;
        total_dur.innerText = `${durM}:${durS < 10 ? '0'+durS : durS}`;
      }
    }
  </script>
</body>
</html>
