<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusForge</title>
  <style>
    /* 1. BASE STYLES */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f6f9;
      color: #111827;
      transition: all 0.3s ease;
    }

    /* 2. NAVIGATION */
    nav {
      background-color: #111827;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      align-items: center;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: 500;
    }

    .login-btn {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .login-btn:hover { background-color: #2563eb; }

    /* 3. THE GRID (The fix for the "Mess") */
   /* Update your CSS Grid to this for uniform sizes */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  grid-auto-rows: 1fr; /* This makes all rows the same height */
  gap: 20px;
  padding: 20px;
}

.card {
  background-color: white;
  border-radius: 12px;
  padding: 30px;
  text-align: center;
  display: flex;           /* Added to align content */
  flex-direction: column;  /* Added */
  justify-content: center; /* Added */
  transition: transform 0.3s ease;
}
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
    }

    /* 5. DARK MODE THEME */
    body.dark-theme {
      background-color: #0f172a;
      color: #f1f5f9;
    }

    body.dark-theme nav { background-color: #000000; }

    body.dark-theme .card {
      background-color: #1e293b;
      color: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    body.dark-theme .card p { color: #9ca3af; }
    body.dark-theme .card h2 { color: #ffffff; }

  </style>
</head>
<body>

  <nav>
    <h1>FocusForge</h1>
    <ul>
      <li><a href="Timetable.html">Timetable</a></li>
      <li><button class="login-btn">Login / Sign Up</button></li>
      <li><button onclick="toggleDarkMode()" style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">🌓</button></li>
    </ul>
  </nav>

  <div class="dashboard"> 

    <a href="Timer.html" style="text-decoration: none; color: inherit;">
      <div class="card">
        <h2>Pomodoro Timer</h2>
        <p style="font-size: 2rem; color: #10b981;">25:00</p>
        <p>Click to Start Session</p>
      </div>
    </a>

    <a href="streak.html" style="text-decoration: none; color: inherit;">
  <div class="card">
    <h2>Study Streak 🔥</h2>
    <p style="font-size: 2.5rem;">Check Progress</p>
    <p id="dashboard-streak-msg">Keep the flame alive!</p>
  </div>
</a>

    <div class="card">
      <h2>LoFi Beats 🎧</h2>
      <p>🎵 Now Playing: Focus.mp3</p>
      <p style="font-size: 0.8rem; margin-top: 10px; color: #6b7280;">Controls coming soon</p>
    </div>

    <div class="card">
      <h2>Upcoming Exams</h2>
      <ul style="list-style: none; padding: 0;">
        <li>Math - 20 Feb</li>
        <li>Science - 22 Feb</li>
      </ul>
    </div>

    <div class="card">
      <h2>Study Hours</h2>
      <p style="font-size: 1.5rem;">0 / 6 hours</p>
    </div>

  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-theme');
    }

    let count = 0;
    function updateStreak() {
      count++;
      document.getElementById('streak-count').innerText = count + " Days";
    }
  </script>

</body>
</html>
