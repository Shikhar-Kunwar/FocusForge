<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streak Tracker - FocusForge</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: 0.3s; }
        body.dark-theme { background-color: #0f172a; color: white; }
        
        .streak-card { background: white; padding: 40px; border-radius: 24px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 500px; }
        body.dark-theme .streak-card { background: #1e293b; color: white; }

        .fire-icon { font-size: 6rem; filter: drop-shadow(0 0 15px rgba(255,165,0,0.4)); margin-bottom: 10px; }
        .streak-num { font-size: 5rem; font-weight: 800; color: #f97316; margin: 0; }
        
        /* The Week Bar */
        .week-bar { display: flex; justify-content: space-between; background: #f1f5f9; padding: 20px; border-radius: 15px; margin: 25px 0; }
        body.dark-theme .week-bar { background: #0f172a; }

        .day-slot { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.3s; color: #94a3b8; }
        
        /* Highlight Today */
        .circle.today { border-color: #3b82f6; color: #3b82f6; border-style: dashed; }
        /* Checked Days */
        .circle.checked { background: #10b981; border-color: #10b981; color: white; }

        .btn-study { background: #f97316; color: white; border: none; padding: 15px 40px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn-study:disabled { background: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="streak-card">
        <div class="fire-icon" id="fire">🔥</div>
        <p class="streak-num" id="count">0</p>
        <p style="text-transform: uppercase; font-weight: bold; color: #f97316;">Days Streak</p>

        <div class="week-bar">
            <div class="day-slot"><div class="circle" id="day-1">M</div><span>Mon</span></div>
            <div class="day-slot"><div class="circle" id="day-2">T</div><span>Tue</span></div>
            <div class="day-slot"><div class="circle" id="day-3">W</div><span>Wed</span></div>
            <div class="day-slot"><div class="circle" id="day-4">T</div><span>Thu</span></div>
            <div class="day-slot"><div class="circle" id="day-5">F</div><span>Fri</span></div>
            <div class="day-slot"><div class="circle" id="day-6">S</div><span>Sat</span></div>
            <div class="day-slot"><div class="circle" id="day-0">S</div><span>Sun</span></div>
        </div>

        <h3 id="msg">You are on fire! 🔥</h3>
        <button class="btn-study" id="studyBtn" onclick="logStudy()">I Studied Today!</button>
        <br><br>
        <a href="FocusForge.html" style="text-decoration: none; color: #94a3b8;">← Back to Dashboard</a>
    </div>

    <script>
        // 1. Theme Check
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');

        // 2. Identify "Today" from System Clock
        const todayIndex = new Date().getDay(); // 0=Sun, 1=Mon...
        document.getElementById(`day-${todayIndex}`).classList.add('today');

        // 3. Load Data
        let streak = parseInt(localStorage.getItem('focusStreak')) || 0;
        let lastLogged = localStorage.getItem('lastDate');
        
        function updateUI() {
            document.getElementById('count').innerText = streak;
            if (lastLogged === new Date().toDateString()) {
                document.getElementById('studyBtn').innerText = "Logged for Today ✓";
                document.getElementById('studyBtn').disabled = true;
                document.getElementById(`day-${todayIndex}`).classList.add('checked');
                document.getElementById(`day-${todayIndex}`).innerText = "✓";
            }
        }

        function logStudy() {
            streak++;
            localStorage.setItem('focusStreak', streak);
            localStorage.setItem('lastDate', new Date().toDateString());
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
